# XcodeGen config for the PearBrowser iOS native shell.
# Phase 3 of the Holepunch alignment plan — see docs/HOLEPUNCH_ALIGNMENT_PLAN.md.
#
# Generate the .xcodeproj with:
#    brew install xcodegen
#    cd ios-native && xcodegen generate
#
# This file is the source of truth — the .xcodeproj is a derived artifact
# (gitignored). Matches the `holepunchto/bare-ios` template pattern.

name: PearBrowser
options:
  bundleIdPrefix: com.pearbrowser
  deploymentTarget:
    iOS: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # fill in for device signing
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  BareKit:
    url: https://github.com/holepunchto/bare-kit-swift
    branch: main

targets:
  PearBrowser:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PearBrowser/Sources
      - path: PearBrowser/Info.plist
        buildPhase: none
      - path: PearBrowser/PearBrowser.entitlements
        buildPhase: none
      - path: PearBrowser/Assets.xcassets
      - path: PearBrowser/LaunchScreen.storyboard
      # The bare-packed worklet bundle. Produce with:
      #   npm run bundle-backend-native-ios (at repo root)
      # Output path is backend/dist/backend.ios.bundle; XcodeGen picks it
      # up here and copies it into the .app's resource folder.
      - path: ../backend/dist/backend.ios.bundle
        type: file
        optional: true
    resources:
      - path: PearBrowser/Assets.xcassets
      - path: PearBrowser/LaunchScreen.storyboard
      - path: ../backend/dist/backend.ios.bundle
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pearbrowser.app
        INFOPLIST_FILE: PearBrowser/Info.plist
        CODE_SIGN_ENTITLEMENTS: PearBrowser/PearBrowser.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        OTHER_LDFLAGS: "-ObjC"
    # BareKit integration has two parts:
    #   1. The .xcframework provides the native C/ObjC binary (bare-kit v2.0.2)
    #   2. The bare-kit-swift SPM package provides the Swift overlay
    #      (Worklet, IPC classes) that our code imports as `import BareKit`
    #
    # Setup (see BUILD.md):
    #   - Run `npm run barekit:fetch` at the repo root to download
    #     prebuilds.zip and place the xcframework in Frameworks/.
    #   - `xcodegen generate` resolves the SPM package automatically.
    dependencies:
      - framework: PearBrowser/Frameworks/BareKit.xcframework
        embed: true
      - package: BareKit
        product: BareKit
      # Native addons (17) required by the backend worklet.
      # Sourced from node_modules/react-native-bare-kit/ios/addons/ —
      # the same pre-built xcframeworks the RN shell uses. Without these
      # the worklet aborts inside `bare_runtime__abort` when the bundle
      # calls require('sodium-universal'), require('udx-native'), etc.
      # Keep in sync with `npm run barekit:fetch:addons`.
      - framework: PearBrowser/Frameworks/addons/bare-crypto.1.13.4.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/bare-dns.2.1.4.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/bare-fs.4.6.0.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/bare-inspect.3.1.4.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/bare-os.3.8.7.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/bare-pipe.4.1.5.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/bare-subprocess.5.2.3.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/bare-tcp.2.2.7.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/bare-type.1.1.0.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/bare-url.2.4.0.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/fs-native-extensions.1.4.5.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/quickbit-native.2.4.8.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/rabin-native.2.0.0.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/rocksdb-native.3.15.0.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/simdle-native.1.3.9.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/sodium-native.5.1.0.xcframework
        embed: true
      - framework: PearBrowser/Frameworks/addons/udx-native.1.19.2.xcframework
        embed: true

schemes:
  PearBrowser:
    build:
      targets:
        PearBrowser: [run, test, profile, analyze, archive]
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

configs:
  Debug: debug
  Release: release
